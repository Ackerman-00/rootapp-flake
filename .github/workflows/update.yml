name: RootApp Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env: 
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v22

      - name: Check for Updates and Update Hash
        run: |
          OLD_HASH=$(grep -oP 'hash = "\K[^"]+' flake.nix)
          NEW_HASH=$(nix store prefetch-file https://installer.rootapp.com/installer/Linux/X64/Root.AppImage --json | jq -r .hash)
          
          echo "Current Hash: $OLD_HASH"
          echo "Live Hash: $NEW_HASH"

          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "Updates found! Pushing new hash to flake.nix..."
            sed -i "s|$OLD_HASH|$NEW_HASH|g" flake.nix
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flake.nix
            git commit -m "chore: auto-update RootApp hash"
            git push
          else
            echo "AppImage is up to date. No action needed."
          fi
